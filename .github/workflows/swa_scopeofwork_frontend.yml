name: Deploy ScopeOfWork Frontend (Static Web App)

on:
  push:
    branches: [ main ]
    paths:
      - frontend/**
      - package.json
      - package-lock.json
      - .github/workflows/swa_scopeofwork_frontend.yml
  workflow_dispatch:

env:
  VITE_API_URL: sowcomposer-e5hzeadgfwbpfdhd.eastus-01.azurewebsites.net

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SOW }}
          app_location: frontend
          output_location: dist
          skip_api_build: true
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
 
