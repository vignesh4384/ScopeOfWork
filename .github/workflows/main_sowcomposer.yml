name: Build and deploy Python app to Azure Web App - SOWComposer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: SOWComposer
  PYTHON_VERSION: '3.12'
  VITE_API_URL: ""
  VITE_SOW_AGENT_URL: https://sowcomposer-e5hzeadgfwbpfdhd.eastus-01.azurewebsites.net

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Build Frontend ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_SOW_AGENT_URL: ${{ env.VITE_SOW_AGENT_URL }}

      # --- Setup Python ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t .python_packages/lib/site-packages

      # --- Package backend + frontend dist together ---
      - name: Archive app for deployment
        run: |
          mkdir -p backend/frontend_dist
          cp -r frontend/dist/* backend/frontend_dist/
          cd backend && zip -r $GITHUB_WORKSPACE/app.zip . -x "__pycache__/*" "*.pyc"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/app.zip
